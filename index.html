<!DOCTYPE html>
<html>
<head>
<title>Hacker Terminal</title>
<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
}
#console{
width:80%;
height:300px;
margin:20px auto;
border:1px solid #00ff00;
padding:10px;
overflow:auto;
text-align:left;
}
button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px 20px;
margin:10px;
cursor:pointer;
}
button:hover{
background:#003300;
}
</style>
</head>

<body>

<h1>ACCESS TERMINAL</h1>

<div id="console"></div>

<button onclick="startLogs()">Start Simulation</button>
<button onclick="stopLogs()">Stop Simulation</button>
<button onclick="sendTest()">Send Test Message</button>

<script>

let interval;

function log(text){
const box=document.getElementById("console");
box.innerHTML += text + "<br>";
box.scrollTop = box.scrollHeight;
}

function randomLog(){
const logs=[
"Scanning network...",
"Decrypting packets...",
"Accessing server...",
"Bypassing firewall...",
"Loading database..."
];
log("> "+logs[Math.floor(Math.random()*logs.length)]);
}

function startLogs(){
interval=setInterval(randomLog,800);
}

function stopLogs(){
clearInterval(interval);
}

function sendTest(){

fetch("https://discord.com/api/webhooks/1480507560627802254/9CzIJcuxUeuOeuD5SHBSlAMvTsMpEOPd377ToxjtGM3jwZvnkMXsww6JE-Av1AAc6PLA",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:"🟢 Webhook test from hacker dashboard"
})
});

log("> Test message sent to webhook");

}

</script>

</body>
</html>
